# Render Blueprint — AI-Accounts FastAPI backend.
# Deploy: Render Dashboard → New → Blueprint → pick this repo.
# The web service builds Backend/Dockerfile (runs `prisma generate`, starts uvicorn on $PORT).
#
# FREE TIER NOTES:
#   * Free web services spin down after ~15 min idle; the next request cold-starts (~30-50s).
#   * Free tier has no pre-deploy command / shell, so DB migrations are NOT run here.
#     Run them once from your machine (see the deploy guide) using DIRECT_URL.
#
# Secrets (sync: false) are left blank on purpose — set them in the Render dashboard,
# never commit real values.
services:
  - type: web
    name: ai-accounts-api
    runtime: docker
    rootDir: Backend
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore # closest to the ap-southeast-1 Supabase region; change if yours differs
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # --- Secrets: set these in the dashboard (Environment tab) ---
      - key: DATABASE_URL # Supabase TRANSACTION pooler :6543 (pgbouncer=true&connection_limit=1)
        sync: false
      - key: DIRECT_URL # Supabase SESSION pooler :5432 (migrations / direct connection)
        sync: false
      - key: CORS_ORIGINS # e.g. https://your-app.vercel.app  (set after the frontend is live)
        sync: false
      - key: APP_PUBLIC_URL # e.g. https://your-app.vercel.app  (used in reset/invite emails)
        sync: false
      - key: BREVO_API_KEY # transactional email — leave blank to disable email sending
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: GROQ_API_KEY # AI assistant — leave blank to disable
        sync: false
      # --- Auto-generated secret ---
      - key: JWT_SECRET_KEY
        generateValue: true
      # --- Safe literal defaults ---
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: OTP_TTL_MINUTES
        value: "15"
      - key: AUTH_EXPOSE_OTP_IN_RESPONSE
        value: "false"
      - key: AUTH_SKIP_EMAIL_VERIFICATION
        value: "true"
      - key: OUTBOX_POLL_ENABLED
        value: "1"
      - key: BREVO_SENDER_NAME
        value: AI-Accounts
      - key: GROQ_ENABLED
        value: "true"
