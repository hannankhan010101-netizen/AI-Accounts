name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Generate Prisma client
        run: python -m prisma generate

      - name: Pytest (no database)
        env:
          PYTHONPATH: src
          SKIP_PRISMA: "1"
          OUTBOX_POLL_ENABLED: "0"
        run: python -m pytest src/tests -q

  frontend:
    name: Frontend check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Production build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://api.example.com
        run: npm run build

  feature-matrix:
    name: Feature matrix artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate FA feature matrix
        run: python scripts/_generate_feature_matrix.py

      - name: Regenerate parity progress report
        run: |
          python scripts/_parity_progress.py
          python scripts/_parity_progress.py --strict-nafy

      - name: Verify matrix is committed
        run: git diff --exit-code Backend/docs/FA-FEATURE-MATRIX.csv Backend/docs/PARITY-PROGRESS-LATEST.md Backend/docs/NAFY-IN-SCOPE-SIGNOFF-LATEST.md Backend/docs/NAFY-UAT-SIGNOFF-LATEST.md Backend/docs/NAFY-RELEASE-READINESS-LATEST.md

  docker-api:
    name: Backend Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t ai-accounts-api:ci Backend

      - name: Smoke container health endpoint
        run: |
          docker run -d --name api-smoke -p 8080:8000 \
            -e SKIP_PRISMA=1 \
            -e JWT_SECRET_KEY=ci-test-secret-key-minimum-32-chars \
            ai-accounts-api:ci
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8080/health; then
              docker rm -f api-smoke
              exit 0
            fi
            sleep 2
          done
          docker logs api-smoke
          docker rm -f api-smoke
          exit 1

  e2e-smoke:
    name: E2E parity smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Backend/pyproject.toml

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install Backend
        working-directory: Backend
        run: |
          pip install -e ".[dev]"
          python -m prisma generate

      - name: Install Frontend
        working-directory: Frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: Frontend
        run: npx playwright install chromium --with-deps

      - name: Build Frontend
        working-directory: Frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
        run: npm run build

      - name: Start API and Frontend
        run: |
          cd Backend
          PYTHONPATH=src SKIP_PRISMA=1 OUTBOX_POLL_ENABLED=0 \
            JWT_SECRET_KEY=ci-e2e-secret-key-minimum-32-characters \
            CORS_ORIGINS=http://127.0.0.1:3000 \
            nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/api.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health && break
            sleep 2
          done
          curl -sf http://127.0.0.1:8000/health || (cat /tmp/api.log && exit 1)
          cd ../Frontend
          nohup npm run start -- -p 3000 -H 127.0.0.1 > /tmp/fe.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sf -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/login | grep -qE '200|307' && break
            sleep 2
          done
          curl -sf http://127.0.0.1:3000/login || (cat /tmp/fe.log && exit 1)

      - name: Run parity smoke
        working-directory: Frontend
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          PLAYWRIGHT_SMOKE_ONLY: "1"
        run: npm run test:e2e:parity
